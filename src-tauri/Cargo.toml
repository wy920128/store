[package]
name = "store"
version = "1.0.0"
description = "UOS 内网应用商店"
authors = ["王野"]
edition = "2021"

[lib]
name = "store_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1.0"
# 数据库：MariaDB 最优依赖
mysql = "25.0"
once_cell = "1.19.0"
thiserror = "1.0"
tokio = { version = "1.0", features = ["full"] }
chrono = { version = "0.4", features = ["serde"] }
